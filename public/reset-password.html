<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva contraseña</title>
    <link rel="stylesheet" href="forgot.css">
</head>
<body>
    <div class="screen-container">
        <header class="header">
            <button class="back-btn" onclick="window.location.href='index.html'">←</button>
        </header>
        <main class="forgot-content">
            <h1 class="title">Crea una contraseña nueva</h1>
            <p class="subtitle">Tu nueva contraseña debe tener al menos 6 caracteres.</p>
            <div class="input-group">
                <input type="password" id="new-password" placeholder="Contraseña nueva">
            </div>
            <div class="input-group">
                <input type="password" id="confirm-password" placeholder="Confirmar contraseña nueva">
            </div>
            <button class="btn-primary" onclick="resetPassword()">Guardar contraseña</button>
            <p id="error-msg" class="error-msg hidden"></p>
            <p id="success-msg" class="success-msg hidden">✅ Contraseña cambiada correctamente</p>
        </main>
    </div>
    <script src="reset.js"></script>
</body>
</html>
