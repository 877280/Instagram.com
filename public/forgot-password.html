<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuentra tu cuenta</title>
    <link rel="stylesheet" href="forgot.css">
</head>
<body>
    <div class="screen-container">
        <header class="header">
            <button class="back-btn" onclick="window.location.href='index.html'">←</button>
        </header>
        <main class="forgot-content">
            <h1 class="title">Encuentra tu cuenta</h1>

            <!-- PANTALLA 1: Número de celular -->
            <div id="screen-phone">
                <p class="subtitle">Ingresa tu número de celular.</p>
                <a href="#" class="blue-link">¿No puedes restablecer la contraseña?</a>
                <div class="input-group">
                    <input type="tel" id="phone-input" placeholder="Número de celular">
                </div>
                <button class="btn-primary" onclick="handlePhone()">Continuar</button>
                <button class="btn-secondary" onclick="showEmailScreen()">Buscar por correo o nombre de usuario</button>
            </div>

            <!-- PANTALLA 2: Correo o usuario (OCULTA por defecto) -->
            <div id="screen-email" style="display:none;">
                <p class="subtitle">Ingresa tu correo electrónico o nombre de usuario.</p>
                <a href="#" class="blue-link">¿No puedes restablecer la contraseña?</a>
                <div class="input-group">
                    <input type="text" id="email-input" placeholder="Correo electrónico o nombre de usuario">
                </div>
                <button class="btn-primary" onclick="handleEmail()">Continuar</button>
                <button class="btn-secondary" onclick="showPhoneScreen()">Buscar por número de celular</button>
            </div>

            <p id="error-msg" class="error-msg hidden"></p>
        </main>
    </div>
    <script src="forgot.js"></script>
</body>
</html>
